services:

  postgres:
    image: postgres:16-alpine
    container_name: veo3_postgres
    restart: always
    environment:
      POSTGRES_DB: veo3
      POSTGRES_USER: veo3
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veo3 -d veo3"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: veo3_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://veo3:${DB_PASSWORD}@postgres:5432/veo3
      ADMIN_SECRET: ${ADMIN_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      BACKEND_PORT: 3001
      NODE_ENV: production
    expose:
      - "3001"
    networks:
      - internal

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: veo3_frontend
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:3001
      NODE_ENV: production
    expose:
      - "5000"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: veo3_nginx
    restart: always
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal
    command: >
      /bin/sh -c "nginx -g 'daemon off;' &
      while sleep 12h; do nginx -s reload; done"

  certbot:
    image: certbot/certbot:latest
    container_name: veo3_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --quiet --webroot --webroot-path=/var/www/certbot;
        sleep 12h & wait $${!};
      done"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
